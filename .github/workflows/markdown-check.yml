name: Markdown Check

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**.md'

jobs:
  markdownlint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Create markdownlint config
        run: |
          cat <<'EOF' > .markdownlint.json
          {
            "default": true,
            "MD001": false,
            "MD003": { "style": "consistent" },
            "MD004": { "style": "consistent" },
            "MD007": { "indent": 2 },
            "MD013": false,
            "MD022": false,
            "MD024": false,
            "MD025": false,
            "MD026": false,
            "MD033": false,
            "MD034": false,
            "MD036": false,
            "MD041": false
          }
          EOF

      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules

      - name: Report success
        if: success()
        run: echo "✅ All Markdown files passed linting!"
