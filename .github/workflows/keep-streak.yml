name: Keep Streak Alive

on:
  schedule:
    - cron: '0 3 * * *'        # Runs every day at 3:00 AM UTC (good time for most people)
  workflow_dispatch:           # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  keep-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update heartbeat file
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC') — Keep Streak" >> .keepalive

      - name: Commit and push if changed
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .keepalive
            git commit -m "chore: daily heartbeat $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit."
          fi
